<!DOCTYPE html>
<html>

<head>
	<title>WebSocket Relay - Login</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			max-width: 400px;
			margin: 100px auto;
			padding: 20px;
			text-align: center;
		}

		input {
			padding: 10px;
			width: 100%;
			margin-bottom: 10px;
			box-sizing: border-box;
		}

		button {
			padding: 10px 20px;
			background: #007bff;
			color: white;
			border: none;
			cursor: pointer;
		}

		button:hover {
			background: #0056b3;
		}

		.error {
			color: red;
			margin-bottom: 10px;
		}
	</style>
</head>

<body>
	<h1>WebSocket Relay Admin</h1>
	<p>Enter your authentication token:</p>
	<input type="password" id="token" placeholder="Auth Token">
	<button onclick="login()">Login</button>
	<p id="error" class="error"></p>
	<script>
		async function checkAuth() {
			try {
				const resp = await fetch('/api/slaves');
				if (resp.ok) {
					window.location.href = '/dashboard';
				}
			} catch (e) { }
		}
		checkAuth();

		async function login() {
			const authToken = document.getElementById('token').value;
			try {
				const resp = await fetch('/api/login', {
					method: 'POST',
					headers: {'Content-Type': 'application/json'},
					body: JSON.stringify({token: authToken})
				});
				if (resp.ok) {
					window.location.href = '/dashboard';
				} else {
					document.getElementById('error').textContent = 'Invalid token';
				}
			} catch (e) {
				document.getElementById('error').textContent = 'Connection error';
			}
		}
	</script>
</body>

</html>
