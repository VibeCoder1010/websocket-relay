<!DOCTYPE html>
<html>

<head>
	<title>WebSocket Relay - Dashboard</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			max-width: 800px;
			margin: 50px auto;
			padding: 20px;
		}

		input {
			padding: 10px;
			width: 100%;
			margin-bottom: 10px;
			box-sizing: border-box;
		}

		button {
			padding: 10px 20px;
			background: #007bff;
			color: white;
			border: none;
			cursor: pointer;
			margin-right: 5px;
		}

		button:hover {
			background: #0056b3;
		}

		select {
			padding: 10px;
		}

		.logout {
			background: #6c757d;
		}

		.logout:hover {
			background: #545b62;
		}

		table {
			width: 100%;
			border-collapse: collapse;
			margin-top: 20px;
		}

		th,
		td {
			padding: 10px;
			border: 1px solid #ddd;
			text-align: left;
		}

		th {
			background: #f5f5f5;
		}

		.kick {
			background: #dc3545;
		}

		.kick:hover {
			background: #c82333;
		}
	</style>
</head>

<body>
	<h1>WebSocket Relay Dashboard</h1>
	<div>
		<button onclick="loadSlaves(); loadLogs();">Refresh</button>
		<button class="logout" onclick="logout()">Logout</button>
	</div>
	<h2>Connected Slaves</h2>
	<table id="slaves">
		<thead>
			<tr>
				<th>Slave ID</th>
				<th>Action</th>
			</tr>
		</thead>
		<tbody></tbody>
	</table>

	<h2>Connection Logs</h2>
	<div>
		<select id="period" onchange="setPeriod(this.value)">
			<option value="">All</option>
			<option value="1h">1 hour</option>
			<option value="1d">1 day</option>
			<option value="7d">7 days</option>
		</select>
	</div>
	<table id="logs">
		<thead>
			<tr>
				<th>Slave ID</th>
				<th>Connected At</th>
				<th>Disconnected At</th>
			</tr>
		</thead>
		<tbody></tbody>
	</table>
	<script>
		let currentSince = '';

		function formatTime(isoString) {
			return new Date(isoString).toLocaleString();
		}

		function setPeriod(period) {
			if (!period) {
				currentSince = '';
			} else {
				const since = new Date();
				switch (period) {
					case '1h': since.setHours(since.getHours() - 1); break;
					case '1d': since.setDate(since.getDate() - 1); break;
					case '7d': since.setDate(since.getDate() - 7); break;
				}
				currentSince = since.toISOString();
			}
			loadLogs();
		}

		async function loadSlaves() {
			try {
				const resp = await fetch('/api/slaves');
				if (resp.status === 401) {
					window.location.href = '/';
					return;
				}
				const data = await resp.json();
				const tbody = document.querySelector('#slaves tbody');
				tbody.innerHTML = '';
				for (const slave of data.slaves) {
					const tr = document.createElement('tr');
					tr.innerHTML = `<td>${slave}</td><td><button class="kick" onclick="kick('${slave}')">Kick</button></td>`;
					tbody.appendChild(tr);
				}
			} catch (e) {
				console.error(e);
			}
		}

		async function loadLogs() {
			try {
				const url = currentSince ? `/api/logs?since=${encodeURIComponent(currentSince)}` : '/api/logs';
				const resp = await fetch(url);
				if (resp.status === 401) return;
				const data = await resp.json();
				const tbody = document.querySelector('#logs tbody');
				tbody.innerHTML = '';
				for (const log of data.logs) {
					const tr = document.createElement('tr');
					const connected = formatTime(log.connected_at);
					const disconnected = log.disconnected_at ? formatTime(log.disconnected_at) : 'Connected';
					tr.innerHTML = `<td>${log.id}</td><td>${connected}</td><td>${disconnected}</td>`;
					tbody.appendChild(tr);
				}
			} catch (e) {
				console.error(e);
			}
		}

		async function kick(slaveId) {
			if (!confirm('Kick slave ' + slaveId + '?')) return;
			await fetch('/api/slaves/' + slaveId + '/kick', {method: 'POST'});
			loadSlaves();
		}

		async function logout() {
			await fetch('/api/logout', {method: 'POST'});
			window.location.href = '/';
		}

		loadSlaves();
		loadLogs();
	</script>
</body>

</html>
