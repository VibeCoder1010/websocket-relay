<!DOCTYPE html>
<html>

<head>
	<title>WebSocket Relay - Dashboard</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			max-width: 800px;
			margin: 50px auto;
			padding: 20px;
		}

		input {
			padding: 10px;
			width: 100%;
			margin-bottom: 10px;
			box-sizing: border-box;
		}

		button {
			padding: 10px 20px;
			background: #007bff;
			color: white;
			border: none;
			cursor: pointer;
			margin-right: 5px;
		}

		button:hover {
			background: #0056b3;
		}

		.logout {
			background: #6c757d;
		}

		.logout:hover {
			background: #545b62;
		}

		table {
			width: 100%;
			border-collapse: collapse;
			margin-top: 20px;
		}

		th,
		td {
			padding: 10px;
			border: 1px solid #ddd;
			text-align: left;
		}

		th {
			background: #f5f5f5;
		}

		.kick {
			background: #dc3545;
		}

		.kick:hover {
			background: #c82333;
		}
	</style>
</head>

<body>
	<h1>WebSocket Relay Dashboard</h1>
	<div>
		<button onclick="loadSlaves()">Refresh</button>
		<button class="logout" onclick="logout()">Logout</button>
	</div>
	<h2>Connected Slaves</h2>
	<table id="slaves">
		<thead>
			<tr>
				<th>Slave ID</th>
				<th>Action</th>
			</tr>
		</thead>
		<tbody></tbody>
	</table>
	<script>
		async function loadSlaves() {
			try {
				const resp = await fetch('/api/slaves');
				if (resp.status === 401) {
					window.location.href = '/';
					return;
				}
				const data = await resp.json();
				const tbody = document.querySelector('#slaves tbody');
				tbody.innerHTML = '';
				for (const slave of data.slaves) {
					const tr = document.createElement('tr');
					tr.innerHTML = `<td>${slave}</td><td><button class="kick" onclick="kick('${slave}')">Kick</button></td>`;
					tbody.appendChild(tr);
				}
			} catch (e) {
				console.error(e);
			}
		}

		async function kick(slaveId) {
			if (!confirm('Kick slave ' + slaveId + '?')) return;
			await fetch('/api/slaves/' + slaveId + '/kick', {method: 'POST'});
			loadSlaves();
		}

		async function logout() {
			await fetch('/api/logout', {method: 'POST'});
			window.location.href = '/';
		}

		loadSlaves();
	</script>
</body>

</html>
